name: Update Laptop Data

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  update-laptops:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Ye zaroori hai file save karne ke liye
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run A.py
        env:
          API_KEY: ${{ secrets.API_KEY }}  # Yahan secret connect ho raha hai
        run: python A.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add laptops.json
          git commit -m "Update laptops.json via GitHub Action" || echo "No changes to commit"
          git push
          
