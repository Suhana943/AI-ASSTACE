name: Update Laptop Data

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  update-laptops:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        # Maine saari dependencies add kar di hain
        run: pip install requests google-generativeai beautifulsoup4
        
      - name: Run A.py
        env:
          # Yahan API_KEY ko change karke API_1 kar diya
          API_1: ${{ secrets.API_1 }}  
        run: python A.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          # 1. Pehle changes ko staging area mein daalein
          git add laptops.json
          
          # 2. Phir commit karein (agar koi change hai toh)
          git commit -m "Update laptops.json" || echo "No changes to commit"
          
          # 3. Ab pull karein (ab unstaged changes nahi hain, toh rebase work karega)
          git pull --rebase origin main
          
          # 4. Ant mein push karein
          git push origin main
          
