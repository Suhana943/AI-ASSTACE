name: Update Laptop Data

on:
  push:
    branches:
      - main # Jab aap code push karenge, tab run hoga
  schedule:
    - cron: '0 0 * * *' # Har 24 ghante mein ek baar (rozana) run hoga

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run A.py
        env:
          API_KEY: ${{ secrets.API_KEY }} # Yahan GitHub Secret se key uthayega
        run: python A.py
