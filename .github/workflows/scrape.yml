name: Auto Amazon Scraper

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * *' 

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install puppeteer-core # Agar koi aur packages hain toh wo bhi yahan install karein

    - name: Run Scraper Script
      env:
        BROWSERLESS_TOKEN: ${{ secrets.BROWSERLESS_TOKEN }}
      run: node scraper.js # Ensure karein scraper.js mein file output path 'hp-laptops.json' ho

    - name: Commit and Push hp-laptops.json
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        # Sirf hp-laptops.json ko track karein
        git add hp-laptops.json
        # Check karein agar koi badlav hua hai toh hi commit karein
        git commit -m "Auto-update: HP Laptops data" || echo "No changes to commit"
        git push
