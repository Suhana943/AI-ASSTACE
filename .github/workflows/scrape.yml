name: Intel Scraper
on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * *' 
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install axios cheerio
      - name: Run Scraper
        run: node scraper.js
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git add intel-laptops.json
          git commit -m "Auto-update Intel Laptops" || exit 0
          git push
          
