name: Auto Amazon Scraper

on:
  workflow_dispatch: # Isse aap mobile se jab chahein 1-click me run kar sakte hain
  schedule:
    - cron: '0 0 * * *' # Yeh automatic roz raat ko 12 baje bhi chalega data update karne

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Puppeteer Core
      run: npm install puppeteer-core

    - name: Run Scraper Script
      env:
        BROWSERLESS_TOKEN: ${{ secrets.BROWSERLESS_TOKEN }}
      run: node scraper.js

    - name: Commit and Push laptops.json
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add laptops.json
        git commit -m "Automatic laptop data update" || exit 0
        git push
        
