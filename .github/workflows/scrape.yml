name: Auto Intel Laptop Pipeline

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * *' 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Scraping Step
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node deps
        run: npm install axios cheerio

      - name: Run Scraper
        run: node scraper.js

      # 2. Review Generation Step
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python deps
        run: pip install google-generativeai

      - name: Run Review Generator
        run: python processor.py
        env:
          API_1: ${{ secrets.API_1 }}

      # 3. Final Commit (Laptops.json aur Reviews folder dono save honge)
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          
          # Add changes (json + reviews folder)
          git add laptops.json reviews/
          
          # Commit only if there are changes
          git commit -m "Auto-update: Scraped laptops and generated new reviews" || echo "No changes to commit"
          git push
          
