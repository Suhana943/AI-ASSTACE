name: Auto Flipkart Intel Scraper

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * *' 

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install puppeteer-core

    - name: Run Scraper Script
      env:
        BROWSERLESS_TOKEN: ${{ secrets.BROWSERLESS_TOKEN }}
      run: node scraper.js

    - name: Commit and Push intel-laptops.json
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        
        # Check karein ki kya file generate hui hai
        if [ -f "intel-laptops.json" ]; then
          git add intel-laptops.json
          # Agar file mein koi badlav nahi hai, toh commit na karein (exit 0)
          git commit -m "Auto-update: Intel Laptops data from Flipkart" || exit 0
          git push
        else
          echo "Warning: intel-laptops.json file nahi mili. Scraper shayad fail ho gaya."
          exit 1
        fi
        
        
        
