name: Auto Laptop Review

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with: 
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Run AI Script
        env:
          API_1: ${{ secrets.API_1 }}
        run: python script.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add laptops.json
          git commit -m "Update laptops.json with new data" || echo "No changes to commit"
          git push
          
    
