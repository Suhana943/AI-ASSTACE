name: Laptop Scraper

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push changes back to the repo
    steps:
      - uses: actions/checkout@v4
      
      # 1. Sabse pehle latest changes pull karein (Taaki history file update rahe)
      - name: Configure Git and Pull
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git pull origin main

      - name: Set up Python
        uses: actions/setup-python@v4
        with: 
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install google-generativeai
        
      - name: Run Python Script
        env:
          API_1: ${{ secrets.API_1 }}
        run: python script.py
          
      - name: Commit and Push
        run: |
          # Add the new review files AND the history file
          git add reviews/ reviewed_laptops.txt
          
          # Check if there are any changes to commit
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto Update: Added new laptop review and history"
            git push
          else
            echo "No new reviews generated, skipping commit."
          fi
          
