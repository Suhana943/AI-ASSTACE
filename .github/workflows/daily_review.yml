name: Laptop Review Workflow

# 1. Manual trigger aur schedule dono ke liye
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:  # <--- Button ke liye

# 2. Permissions add ki hain taaki code push ho sake
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Pura history fetch karne ke liye, jo git pull ke liye zaroori hai

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install google-generativeai

      - name: Run Python Script
        env:
          API_1: ${{ secrets.API_1 }}
        run: |
          python script.py
          
      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          git add reviews/ reviewed_laptops.txt laptops.json
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto Update: New Review + JSON Sync"
            
            # Error fix karne ke liye pull rebase add kiya hai
            git pull --rebase origin main
            git push
          else
            echo "No changes found, skipping commit."
          fi
          
