name: Laptop Review Workflow

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install google-generativeai

      - name: Run Python Script
        env:
          API_1: ${{ secrets.API_1 }}
        run: |
          python script.py

      - name: Commit and Push
        run: |
          # 1. Sabse pehle local changes ko commit karein
          git add reviews/ reviewed_laptops.txt laptops.json
          # Agar koi badlav nahi hai toh commit skip karein
          git commit -m "Auto Update: New Review + JSON Sync" || echo "No changes to commit"
          
          # 2. Rebase karte waqt '-X theirs' ka use karein.
          # Ye conflict hone par script wala data hi rakhega.
          git pull --rebase -X theirs origin main
          
          # 3. Ab push karein
          git push origin main
          
