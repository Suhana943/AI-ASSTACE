name: Auto Laptop Review
on:
  schedule:
    - cron: '0 5 * * *' # Har roz subah 5 baje
  workflow_dispatch: # Manual run ke liye

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with: 
          python-version: '3.10' # Error fix karne ke liye update kiya

      - name: Install dependencies
        run: pip install -U google-generativeai # Latest version install hoga

      - name: Run AI Script
        env:
          API_1: ${{ secrets.API_1 }}
        run: python script.py

      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Sirf tabhi commit karein agar changes hue hain
          if [ -n "$(git status --porcelain)" ]; then
            git add reviews/
            git commit -m "Naya Laptop Review Add Hua"
            git push
          else
            echo "No changes to commit"
          fi
          
