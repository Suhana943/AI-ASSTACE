name: Laptop Review Workflow

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'

      # --- NAYA STEP: Pull changes BEFORE running script ---
      - name: Sync with Remote
        run: |
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install google-generativeai

      - name: Run Python Script
        env:
          API_1: ${{ secrets.API_1 }}
        run: |
          python script.py

      # --- UPDATED STEP: Robust Commit and Push ---
      - name: Commit and Push
        run: |
          git add reviews/ reviewed_laptops.txt laptops.json
          # Commit only if there are changes
          git commit -m "Auto Update: New Review + JSON Sync" || echo "No changes to commit"
          
          # Pull again before pushing to catch any race conditions, 
          # using '-X theirs' to prioritize your script's output
          git pull --rebase -X theirs origin main
          
          # Push the changes
          git push origin main
          
