name: Laptop Review Workflow

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Ye rozana ek baar chalega (optional)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install google-generativeai

      - name: Run Python Script
        env:
          API_1: ${{ secrets.API_1 }}
        run: |
          python script.py
          
      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          # Sirf unhi files ko add kar rahe hain jo update hui hain
          git add reviews/ reviewed_laptops.txt laptops.json
          
          # Check karo agar koi badlav hua hai, tabhi commit karo
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto Update: New Review + JSON Sync"
            git push
          else
            echo "No changes found, skipping commit."
          fi
          
