name: Laptop Review Workflow

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install google-generativeai

      - name: Run Python Script
        env:
          API_1: ${{ secrets.API_1 }}
        run: |
          python script.py

      - name: Commit and Push
        run: |
          # 1. Check karo ki koi badlav hua hai ya nahi
          if [ -n "$(git status --porcelain)" ]; then
            git add reviews/ reviewed_laptops.txt laptops.json
            git commit -m "Auto Update: New Review + JSON Sync"
            
            # 2. Push karne se pehle latest changes pull karo (Rebase mode mein)
            # --rebase se commit history saaf rehti hai
            git pull --rebase origin main
            
            # 3. Ab push karo
            git push origin main
          else
            echo "No changes found, skipping commit."
          fi
          
