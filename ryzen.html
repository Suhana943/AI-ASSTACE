
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaptopTec - Best Laptop Guide 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-body: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); margin: 0; color: var(--text-dark); }

        /* Main Container for Fixed Width */
        .page-wrapper { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        header { background-color: #1e293b; padding: 1.5rem 0; color: white; }
        
        .controls { display: flex; gap: 15px; margin: 30px 0; }
        .search-box, .sort-box { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; }
        .search-box { flex: 2; }
        .sort-box { flex: 1; }

        /* Grid Setup - Prevent Repetition/Overlap */
        .laptop-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            margin-bottom: 50px;
        }

        .product-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 20px; 
            border: 1px solid #e2e8f0; 
            display: flex; 
            flex-direction: column;
            text-align: center;
        }

        .product-img { width: 100%; height: 180px; object-fit: contain; margin-bottom: 15px; }
        .price { font-size: 1.2rem; font-weight: 700; color: var(--primary-color); margin: 10px 0; }
        .btn { background: var(--primary-color); color: white; padding: 10px; border-radius: 6px; text-decoration: none; margin-top: auto; }
        
        footer { background: #0f172a; color: #94a3b8; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="page-wrapper"><strong>LaptopTec.online</strong></div>
</header>

<main class="page-wrapper">
    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="लैपटॉप सर्च करें..." onkeyup="filterLaptops()">
        <select id="sortSelect" class="sort-box" onchange="sortLaptops()">
            <option value="default">कीमत क्रम</option>
            <option value="asc">कम से ज्यादा</option>
            <option value="desc">ज्यादा से कम</option>
        </select>
    </div>

    <div id="laptopGrid" class="laptop-grid">
        <div class="product-card" data-price="25500">
            <h3>HP Chromebook</h3>
            <img src="https://uploads.onecompiler.io/44r7prtu8/44r7prvxz/9976.jpg" class="product-img">
            <div class="price">₹25,500</div>
            <a href="#" class="btn">अभी देखें</a>
        </div>
        <div class="product-card" data-price="41190">
            <h3>HP 255 G10</h3>
            <img src="https://uploads.onecompiler.io/44r7prtu8/44r7sqvve/10043.jpg" class="product-img">
            <div class="price">₹41,190</div>
            <a href="#" class="btn">अभी देखें</a>
        </div>
    </div>
</main>

<script>
    function filterLaptops() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.product-card').forEach(card => {
            let name = card.querySelector('h3').innerText.toLowerCase();
            card.style.display = name.includes(input) ? "flex" : "none";
        });
    }

    function sortLaptops() {
        let grid = document.getElementById('laptopGrid');
        let cards = Array.from(grid.getElementsByClassName('product-card'));
        let order = document.getElementById('sortSelect').value;
        if(order === 'default') return;

        cards.sort((a, b) => {
            let pA = parseInt(a.getAttribute('data-price'));
            let pB = parseInt(b.getAttribute('data-price'));
            return order === 'asc' ? pA - pB : pB - pA;
        });
        cards.forEach(card => grid.appendChild(card));
    }
</script>

<footer>&copy; 2026 LaptopTec.online</footer>
</body>
</html>
